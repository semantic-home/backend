name: Backend CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run python -m unittest discover -s tests

  publish_image:
    runs-on: ubuntu-latest
    needs: test
    if: >
      github.ref_type == 'tag' ||
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compute image tags
        id: image
        run: |
          IMAGE="${{ vars.REGISTRY_IMAGE }}"
          if [ -z "${IMAGE}" ]; then
            IMAGE="registry.myhometech.de/${GITHUB_REPOSITORY,,}"
          fi
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION_TAG="${GITHUB_REF_NAME}"
          else
            VERSION_TAG="dev-${GITHUB_SHA::7}"
          fi
          {
            echo "image=${IMAGE}"
            echo "version_tag=${VERSION_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: registry.myhometech.de
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.version_tag }}
            ${{ steps.image.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
